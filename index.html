<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ClubTrack</title>
<link rel="apple-touch-icon" href="Logo.png">
<link rel="icon" href="Logo.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Karla:ital,wght@0,400;0,600;0,700;1,400&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --green:       #243d20;
    --green-mid:   #2e5228;
    --fairway:     #3d7033;
    --turf:        #4d8f41;
    --cream:       #ede8db;
    --cream-dim:   #b8b0a0;
    --dark:        #0f1a0d;
    --gold:        #c9a84c;
    --gold-bright: #e8c96a;
    --border:      rgba(255,255,255,0.07);
    --border-gold: rgba(201,168,76,0.25);
  }

  html, body {
    height: 100%; overflow: hidden;
    background: var(--dark);
    color: var(--cream);
    font-family: 'Karla', sans-serif;
  }

  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 80% 60% at 15% -10%, rgba(61,112,51,0.35) 0%, transparent 70%),
      radial-gradient(ellipse 60% 50% at 90% 110%, rgba(45,90,39,0.2) 0%, transparent 60%),
      repeating-linear-gradient(170deg, transparent 0px, transparent 18px, rgba(255,255,255,0.012) 18px, rgba(255,255,255,0.012) 19px);
  }

  .app {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    height: 100vh;
    max-width: 430px; margin: 0 auto;
  }

  /* ── HEADER ── */
  .header {
    padding: 14px 18px 11px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border-gold);
    background: rgba(15,26,13,0.6);
    backdrop-filter: blur(8px);
    flex-shrink: 0;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 21px; letter-spacing: 3px; color: var(--gold);
    display: flex; align-items: center; gap: 7px;
  }
  .hole-nav { display: flex; align-items: center; gap: 6px; }
  .nav-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    color: var(--cream); font-size: 20px; line-height: 1;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.1s; user-select: none;
  }
  .nav-btn:active { background: rgba(201,168,76,0.2); transform: scale(0.86); }
  .hole-display { min-width: 80px; text-align: center; }
  .hole-word {
    font-size: 9px; font-weight: 600; letter-spacing: 2px;
    text-transform: uppercase; color: var(--cream-dim); display: block;
  }
  .hole-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px; letter-spacing: 1px; color: var(--cream); line-height: 1;
  }
  .hole-par {
    font-size: 9px; font-weight: 600; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--cream-dim);
    display: block; text-align: center; min-height: 12px;
  }
  .settings-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    color: var(--cream-dim); font-size: 17px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.1s; flex-shrink: 0;
  }
  .settings-btn:active { background: rgba(201,168,76,0.2); color: var(--gold); transform: scale(0.86); }
  .settings-btn.locked { opacity: 0.25; cursor: not-allowed; pointer-events: none; }

  /* ── HOLE STRIP ── */
  .strip-wrap {
    padding: 7px 18px 6px; flex-shrink: 0;
    border-bottom: 1px solid var(--border);
    background: rgba(15,26,13,0.4);
  }
  .strip { display: flex; gap: 4px; overflow-x: auto; scrollbar-width: none; }
  .strip::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0;
    width: 26px; height: 26px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700;
    cursor: pointer; transition: all 0.12s;
    border: 1.5px solid transparent;
    background: rgba(255,255,255,0.04);
    color: rgba(255,255,255,0.3);
  }
  .chip.logged { background: rgba(61,112,51,0.55); color: var(--cream); }
  .chip.active { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.12); }

  /* ── SHOT LOG ── */
  .shot-log {
    padding: 8px 18px; min-height: 58px; flex-shrink: 0;
    border-bottom: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 5px;
  }
  .log-label {
    font-size: 9px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: var(--cream-dim);
  }
  #shotCount {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px; color: var(--gold); letter-spacing: 1px;
    margin-left: 5px;
  }
  .shots-row { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
  .shot-pill {
    background: rgba(45,82,40,0.7);
    border: 1px solid rgba(77,143,65,0.5);
    border-radius: 20px; padding: 3px 8px 3px 7px;
    font-size: 13px; font-weight: 600; color: var(--cream);
    display: inline-flex; align-items: center; gap: 4px;
    animation: pop 0.16s cubic-bezier(0.34,1.56,0.64,1);
  }
  .shot-pill.penalty {
    background: rgba(176,48,32,0.25);
    border: 1px solid rgba(224,112,96,0.4);
    color: #e07060;
  }
  @keyframes pop {
    from { transform: scale(0.5); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }
  .pill-num { font-size: 9px; color: var(--gold); font-weight: 700; }
  .pill-x {
    background: none; border: none;
    color: rgba(255,255,255,0.25); cursor: pointer;
    font-size: 11px; padding: 0; line-height: 1; transition: color 0.1s;
  }
  .pill-x:active { color: #e05040; }
  .no-shots { color: rgba(255,255,255,0.25); font-size: 12px; font-style: italic; }

  /* ── CLUB GRID ── */
  .clubs-area {
    flex: 1; overflow-y: auto; scrollbar-width: none;
    padding: 10px 18px 10px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .clubs-area::-webkit-scrollbar { display: none; }
  .group { display: flex; flex-direction: column; gap: 6px; }
  .group-title {
    font-size: 9px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: rgba(201,168,76,0.5);
  }
  .grid { display: grid; gap: 7px; }
  .grid-3 { grid-template-columns: repeat(3, 1fr); }
  .grid-4 { grid-template-columns: repeat(4, 1fr); }
  .grid-5 { grid-template-columns: repeat(5, 1fr); }

  .cbt {
    background: rgba(255,255,255,0.055);
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 13px; color: var(--cream);
    font-family: 'Karla', sans-serif;
    font-size: 16px; font-weight: 700;
    padding: 15px 6px; cursor: pointer; text-align: center;
    transition: transform 0.08s, background 0.08s, border-color 0.08s;
    user-select: none;
  }
  .cbt:active { transform: scale(0.88); background: rgba(77,143,65,0.55); border-color: var(--turf); }
  .cbt.flash { animation: cflash 0.38s ease forwards; }
  @keyframes cflash {
    0%   { background: rgba(201,168,76,0.5); border-color: var(--gold-bright); }
    100% { background: rgba(255,255,255,0.055); border-color: rgba(255,255,255,0.09); }
  }

  /* ── PUTTER STEPPER ── */
  .putter-stepper {
    display: flex; align-items: center;
    background: rgba(201,168,76,0.08);
    border: 1px solid rgba(201,168,76,0.22);
    border-radius: 13px; overflow: hidden; height: 52px;
  }
  .putter-step-btn {
    flex: 0 0 56px; height: 100%;
    background: none; border: none;
    color: var(--gold); font-size: 26px; font-weight: 300;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.1s; user-select: none;
  }
  .putter-step-btn:active { background: rgba(201,168,76,0.25); }
  .putter-step-btn:disabled { color: rgba(201,168,76,0.2); cursor: default; }
  .putter-count-wrap {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 1px;
    border-left: 1px solid rgba(201,168,76,0.15);
    border-right: 1px solid rgba(201,168,76,0.15);
  }
  .putter-count {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px; color: var(--gold); line-height: 1;
  }
  .putter-count.bump { animation: bump 0.18s ease; }
  @keyframes bump {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.3); }
    100% { transform: scale(1); }
  }
  .putter-label {
    font-size: 8px; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase; color: rgba(201,168,76,0.5);
  }

  /* ── BOTTOM BAR ── */
  .bottom-bar {
    padding: 10px 18px calc(20px + env(safe-area-inset-bottom));
    border-top: 1px solid var(--border);
    display: flex; gap: 8px; flex-shrink: 0;
    background: rgba(15,26,13,0.5);
    backdrop-filter: blur(8px);
  }
  .undo-btn {
    background: rgba(176,48,32,0.1); border: 1px solid rgba(176,48,32,0.28);
    color: #e07060; border-radius: 12px; padding: 13px 14px;
    font-family: 'Karla', sans-serif; font-size: 14px; font-weight: 700;
    cursor: pointer; flex-shrink: 0; transition: all 0.12s;
  }
  .undo-btn:active { background: rgba(176,48,32,0.3); transform: scale(0.94); }
  .sum-btn {
    flex: 1; background: rgba(201,168,76,0.1);
    border: 1px solid var(--border-gold); color: var(--gold);
    border-radius: 12px; padding: 13px;
    font-family: 'Karla', sans-serif; font-size: 14px; font-weight: 700;
    cursor: pointer; letter-spacing: 0.3px; transition: all 0.12s;
  }
  .sum-btn:active { background: rgba(201,168,76,0.25); transform: scale(0.97); }

  /* ── OVERLAYS (shared) ── */
  .overlay {
    position: fixed; top: 0; right: 0; bottom: 0; left: 0; z-index: 100;
    background: rgba(8,13,7,0.97);
    display: none;
    padding: 22px 20px calc(24px + env(safe-area-inset-bottom));
  }
  .overlay.open { display: flex; flex-direction: column; }
  .ov-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px; flex-shrink: 0;
  }
  .ov-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px; letter-spacing: 2px; color: var(--gold);
  }
  .ov-close {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,0.07);
    border: 1px solid var(--border);
    color: var(--cream); font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  /* ── SUMMARY ── */
  .ov-body { flex: 1; overflow-y: auto; scrollbar-width: none; }
  .ov-body::-webkit-scrollbar { display: none; }
  .sum-row {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 9px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .sum-left { text-align: right; min-width: 28px; flex-shrink: 0; }
  .sum-hnum { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--gold); line-height: 1; }
  .sum-shots-count { font-size: 9px; color: var(--cream-dim); letter-spacing: 0.5px; }
  .sum-pills { flex: 1; display: flex; flex-wrap: wrap; gap: 4px; padding-top: 2px; }
  .sum-pill {
    background: rgba(45,82,40,0.55); border: 1px solid rgba(77,143,65,0.3);
    border-radius: 14px; padding: 2px 8px;
    font-size: 12px; font-weight: 600; color: var(--cream);
  }
  .sum-none { font-size: 12px; color: rgba(255,255,255,0.25); font-style: italic; padding-top: 3px; }
  .sum-sf {
    flex-shrink: 0; min-width: 36px; text-align: center;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px;
  }
  .sum-sf-pts {
    font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--gold); line-height: 1;
  }
  .sum-sf-lbl { font-size: 8px; color: var(--cream-dim); letter-spacing: 0.5px; }
  .ov-stats { flex-shrink: 0; padding: 10px 0 0; display: flex; flex-wrap: wrap; gap: 10px; }
  .stat-box {
    flex: 1; background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 10px; padding: 10px; text-align: center;
  }
  .stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--gold); line-height: 1; }
  .stat-lbl { font-size: 10px; color: var(--cream-dim); letter-spacing: 1px; margin-top: 2px; }
  .copy-btn {
    flex-shrink: 0; margin-top: 12px; width: 100%;
    background: var(--green-mid); border: none; border-radius: 12px;
    color: white; font-family: 'Karla', sans-serif;
    font-size: 15px; font-weight: 700; padding: 15px; cursor: pointer;
  }
  .copy-btn:active { background: var(--fairway); }
  .new-round-btn {
    flex-shrink: 0; margin-top: 8px; width: 100%;
    background: rgba(176,48,32,0.1); border: 1px solid rgba(176,48,32,0.3);
    border-radius: 12px; color: #e07060;
    font-family: 'Karla', sans-serif;
    font-size: 15px; font-weight: 700; padding: 14px; cursor: pointer;
  }
  .new-round-btn:active { background: rgba(176,48,32,0.28); }

  /* ── SETTINGS ── */
  .settings-scroll { flex: 1; overflow-y: auto; scrollbar-width: none; }
  .settings-scroll::-webkit-scrollbar { display: none; }
  .settings-group { margin-bottom: 22px; }
  .settings-group-title {
    font-size: 9px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: rgba(201,168,76,0.55);
    margin-bottom: 10px;
  }
  .settings-club-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .toggle-btn {
    background: rgba(255,255,255,0.04);
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 12px; color: rgba(255,255,255,0.3);
    font-family: 'Karla', sans-serif;
    font-size: 15px; font-weight: 700;
    padding: 14px 6px; text-align: center;
    cursor: pointer; transition: all 0.15s; user-select: none;
  }
  .toggle-btn.on {
    background: rgba(61,112,51,0.45);
    border-color: rgba(77,143,65,0.6);
    color: var(--cream);
  }
  .toggle-btn:active { transform: scale(0.90); }
  .settings-putter-note {
    background: rgba(201,168,76,0.07);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 12px; padding: 12px 14px;
    font-size: 13px; color: var(--cream-dim);
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 4px;
  }
  .settings-start-btn {
    flex-shrink: 0; margin-top: 14px; width: 100%;
    background: var(--green-mid); border: none; border-radius: 12px;
    color: white; font-family: 'Karla', sans-serif;
    font-size: 16px; font-weight: 700; padding: 16px;
    cursor: pointer; letter-spacing: 0.5px;
  }
  .settings-start-btn:active { background: var(--fairway); }

  /* ── LOBBY ── */
  .lobby-logo {
    display: flex; flex-direction: column; align-items: center;
    padding: 32px 0 22px; flex-shrink: 0;
  }
  .lobby-logo-img {
    max-width: 160px; max-height: 72px; object-fit: contain;
    margin-bottom: 12px; display: none;
  }
  .lobby-logo-img[src]:not([src=""]) { display: block; }
  .lobby-brand {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 38px; letter-spacing: 5px; color: var(--gold);
  }
  .lobby-tagline {
    font-size: 10px; letter-spacing: 2.5px; color: var(--cream-dim);
    text-transform: uppercase; margin-top: 5px;
  }
  .lobby-scroll {
    flex: 1; overflow-y: auto; scrollbar-width: none;
    display: flex; flex-direction: column; gap: 22px; padding: 4px 0;
  }
  .lobby-scroll::-webkit-scrollbar { display: none; }
  .lobby-section { display: flex; flex-direction: column; gap: 10px; }
  .lobby-label {
    font-size: 9px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: rgba(201,168,76,0.55);
  }
  .lobby-opts { display: flex; gap: 8px; }
  .lobby-opt {
    flex: 1;
    background: rgba(255,255,255,0.04);
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 12px; color: rgba(255,255,255,0.35);
    font-family: 'Karla', sans-serif;
    font-size: 14px; font-weight: 700;
    padding: 14px 8px; text-align: center;
    cursor: pointer; transition: all 0.15s; user-select: none;
  }
  .lobby-opt.sel {
    background: rgba(61,112,51,0.45);
    border-color: rgba(77,143,65,0.6);
    color: var(--cream);
  }
  .lobby-opt:active { transform: scale(0.92); }
  .lobby-custom-input {
    background: rgba(255,255,255,0.05);
    border: 1.5px solid rgba(255,255,255,0.12);
    border-radius: 12px; color: var(--cream);
    font-family: 'Karla', sans-serif;
    font-size: 15px; font-weight: 600;
    padding: 13px 14px; width: 100%; outline: none;
  }
  .lobby-custom-input:focus { border-color: rgba(201,168,76,0.45); }
  .lobby-custom-input::placeholder { color: rgba(255,255,255,0.25); }
  .lobby-hcp-stepper {
    display: flex; align-items: center;
    background: rgba(201,168,76,0.08);
    border: 1px solid rgba(201,168,76,0.22);
    border-radius: 13px; overflow: hidden; height: 56px;
  }
  .lobby-hcp-btn {
    flex: 0 0 64px; height: 100%;
    background: none; border: none;
    color: var(--gold); font-size: 28px; font-weight: 300;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.1s; user-select: none;
  }
  .lobby-hcp-btn:active { background: rgba(201,168,76,0.25); }
  .lobby-hcp-btn:disabled { color: rgba(201,168,76,0.2); cursor: default; }
  .lobby-hcp-mid {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    border-left: 1px solid rgba(201,168,76,0.15);
    border-right: 1px solid rgba(201,168,76,0.15);
  }
  .lobby-hcp-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px; color: var(--gold); line-height: 1;
  }
  .lobby-hcp-lbl {
    font-size: 8px; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase; color: rgba(201,168,76,0.5);
  }
  .lobby-start-btn {
    flex-shrink: 0; margin-top: 14px; width: 100%;
    background: var(--green-mid); border: none; border-radius: 14px;
    color: white; font-family: 'Karla', sans-serif;
    font-size: 17px; font-weight: 700; padding: 18px;
    cursor: pointer; letter-spacing: 0.5px; transition: background 0.12s;
  }
  .lobby-start-btn:active { background: var(--fairway); }
  .lobby-start-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* ── FOOTNOTE ── */
  .footnote {
    text-align: center;
    font-size: 10px; letter-spacing: 1px;
    color: rgba(255,255,255,0.15);
    padding: 6px 0 4px;
    flex-shrink: 0;
  }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="logo">⛳ ClubTrack</div>
    <div class="hole-nav">
      <button class="nav-btn" id="prev">‹</button>
      <div class="hole-display">
        <span class="hole-word">Hole</span>
        <span class="hole-num" id="hNum">1</span>
        <span class="hole-par" id="holePar"></span>
      </div>
      <button class="nav-btn" id="next">›</button>
    </div>
    <button class="settings-btn" id="settingsBtn">⚙︎</button>
  </div>

  <div class="strip-wrap">
    <div class="strip" id="strip"></div>
  </div>

  <div class="shot-log">
    <div class="log-label">Shots this hole <span id="shotCount"></span></div>
    <div class="shots-row" id="shotsRow"></div>
  </div>

  <div class="clubs-area" id="clubsArea"></div>

  <div class="footnote">© 2026 Robert Michels</div>

  <div class="bottom-bar">
    <button class="undo-btn" id="undoBtn">↩ Undo</button>
    <button class="sum-btn" id="sumBtn">📋 Round Summary</button>
  </div>
</div>

<!-- Lobby overlay -->
<div class="overlay" id="lobbyOverlay">
  <div class="lobby-logo">
    <!-- To add your own logo: set src="Logo.png" (place the file alongside index.html) -->
    <img class="lobby-logo-img" id="lobbyLogoImg" src="" alt="">
    <div class="lobby-brand">⛳ ClubTrack</div>
    <div class="lobby-tagline">Track every club. Every hole.</div>
  </div>
  <div class="lobby-scroll">
    <div class="lobby-section">
      <div class="lobby-label">Course</div>
      <div class="lobby-opts" id="courseOpts"></div>
      <input type="text" class="lobby-custom-input" id="customCourse" placeholder="Enter course name…" style="display:none">
    </div>
    <div class="lobby-section">
      <div class="lobby-label">Holes</div>
      <div class="lobby-opts" id="holesOpts"></div>
    </div>
    <div class="lobby-section">
      <div class="lobby-label">Handicap (HCP)</div>
      <input type="number" class="lobby-custom-input" id="hcpInput" min="0" max="54" placeholder="33">
    </div>
  </div>
  <button class="lobby-start-btn" id="lobbyStartBtn" disabled>Select a course &amp; holes to start →</button>
</div>

<!-- Summary overlay -->
<div class="overlay" id="summaryOverlay">
  <div class="ov-head">
    <div class="ov-title">Round Summary</div>
    <button class="ov-close" id="sumClose">×</button>
  </div>
  <div class="ov-body" id="ovBody"></div>
  <div class="ov-stats" id="ovStats"></div>
  <button class="copy-btn" id="copyBtn">Copy to Clipboard</button>
  <button class="new-round-btn" id="newRoundBtn">New Round</button>
</div>

<!-- Settings overlay -->
<div class="overlay" id="settingsOverlay">
  <div class="ov-head">
    <div class="ov-title">Your Bag</div>
    <button class="ov-close" id="settingsClose">×</button>
  </div>
  <div class="settings-scroll" id="settingsScroll"></div>
  <button class="settings-start-btn" id="startRoundBtn">Start Round →</button>
</div>

<script>
// ── ALL AVAILABLE CLUBS ──
const ALL_CLUBS = {
  'Woods & Hybrid': ['D', '3W', '5W', '7W', '2H', '3H', '4H', '5H', '6H'],
  'Irons':          ['2i', '3i', '4i', '5i', '6i', '7i', '8i', '9i'],
  'Wedges':         ['PW', 'PA', 'GW', 'AW', 'SW', 'LW']
};

// ── COURSE DATA ──
const COURSES = {
  'Golfclub St Genis': {
    par: 74, sss: 70.2, slope: 131,
    holes: [
      { par: 4, si: 1  },
      { par: 5, si: 11 },
      { par: 4, si: 13 },
      { par: 3, si: 17 },
      { par: 4, si: 15 },
      { par: 4, si: 5  },
      { par: 5, si: 3  },
      { par: 3, si: 7  },
      { par: 5, si: 9  },
      { par: 4, si: 2  },
      { par: 5, si: 12 },
      { par: 4, si: 14 },
      { par: 3, si: 18 },
      { par: 4, si: 16 },
      { par: 4, si: 6  },
      { par: 5, si: 4  },
      { par: 3, si: 8  },
      { par: 5, si: 10 },
    ]
  }
};

function getCourseData() {
  return COURSES[selectedCourse] || null;
}

// WHS course handicap → adjusted for number of holes played
function calcPlayingHCP(course, totalHoles) {
  const ch = Math.round(hcp * (course.slope / 113) + (course.sss - course.par));
  return Math.round(ch * totalHoles / 18);
}

// How many extra strokes a player receives on a given hole (0-based index)
function strokesOnHole(holeIdx, playingHcp, course) {
  const si   = course.holes[holeIdx].si;
  const base = Math.floor(playingHcp / 18);
  const rem  = playingHcp % 18;
  return base + (si <= rem ? 1 : 0);
}

// Stableford points for a hole (returns null if hole not played)
function stablefordPoints(holeIdx, grossShots, playingHcp, course) {
  if (!grossShots) return null;
  const par     = course.holes[holeIdx].par;
  const strokes = strokesOnHole(holeIdx, playingHcp, course);
  return Math.max(0, 2 + par + strokes - grossShots);
}

// My default bag — loaded on every fresh page open
const DEFAULT_BAG = ['D', '5W', '5H', '5i', '6i', '7i', '8i', '9i', 'PW', 'PA', 'AW', 'SW'];

let activeBag = [...DEFAULT_BAG];

let HOLES = 18;
let hole  = 1;
let round = Array.from({length: HOLES}, () => []);

// ── LOBBY STATE ──
const PRESET_COURSES = ['Golfclub St Genis', 'Others'];
const HOLE_OPTIONS   = [5, 9, 18];
let selectedCourse   = '';
let selectedHoles    = 0;   // 0 = not yet chosen
let hcp              = 33;

// ── LOCALSTORAGE ──
function saveState() {
  localStorage.setItem('gct_round',  JSON.stringify(round));
  localStorage.setItem('gct_hole',   hole);
  localStorage.setItem('gct_bag',    JSON.stringify(activeBag));
  localStorage.setItem('gct_holes',  HOLES);
  localStorage.setItem('gct_course', selectedCourse);
  localStorage.setItem('gct_hcp',    hcp);
}
function loadState() {
  const savedRound  = localStorage.getItem('gct_round');
  const savedHole   = localStorage.getItem('gct_hole');
  const savedBag    = localStorage.getItem('gct_bag');
  const savedHoles  = localStorage.getItem('gct_holes');
  const savedCourse = localStorage.getItem('gct_course');
  const savedHcp    = localStorage.getItem('gct_hcp');
  if (savedRound)  round          = JSON.parse(savedRound);
  if (savedHole)   hole           = parseInt(savedHole, 10);
  if (savedBag)    activeBag      = JSON.parse(savedBag);
  if (savedHoles)  { HOLES = parseInt(savedHoles, 10); selectedHoles = HOLES; }
  if (savedCourse) selectedCourse = savedCourse;
  if (savedHcp !== null) hcp      = parseInt(savedHcp, 10);
}
loadState();

function roundStarted() {
  return round.some(h => h.length > 0);
}

// ── STRIP ──
function buildStrip() {
  const stripEl = document.getElementById('strip');
  stripEl.innerHTML = '';
  for (let i = 1; i <= HOLES; i++) {
    const c = document.createElement('div');
    c.className = 'chip'; c.textContent = i; c.dataset.h = i;
    c.addEventListener('click', () => { hole = i; render(); });
    stripEl.appendChild(c);
  }
}

// ── BUILD CLUB BUTTONS ──
function gridClass(n) {
  if (n <= 3) return 'grid-3';
  if (n === 4) return 'grid-4';
  return 'grid-5';
}

function buildClubButtons() {
  const area = document.getElementById('clubsArea');
  area.innerHTML = '';

  // Filter using master list order, not activeBag order
  const groups = {
    'Woods & Hybrid': ALL_CLUBS['Woods & Hybrid'].filter(c => activeBag.includes(c)),
    'Irons':          ALL_CLUBS['Irons'].filter(c => activeBag.includes(c)),
    'Wedges':         ALL_CLUBS['Wedges'].filter(c => activeBag.includes(c))
  };

  Object.entries(groups).forEach(([title, clubs]) => {
    if (!clubs.length) return;

    const group = document.createElement('div');
    group.className = 'group';
    group.innerHTML = `<div class="group-title">${title}</div>`;

    const grid = document.createElement('div');
    grid.className = `grid ${gridClass(clubs.length)}`;

    clubs.forEach(name => {
      const b = document.createElement('button');
      b.className = 'cbt';
      b.textContent = name;
      b.addEventListener('click', () => {
        round[hole - 1].push(name);
        b.classList.remove('flash');
        void b.offsetWidth;
        b.classList.add('flash');
        saveState();
        render();
      });
      grid.appendChild(b);
    });

    group.appendChild(grid);
    area.appendChild(group);
  });

  // Putter stepper — always present
  const putterGroup = document.createElement('div');
  putterGroup.className = 'group';
  putterGroup.innerHTML = `
    <div class="group-title">Putter</div>
    <div class="putter-stepper">
      <button class="putter-step-btn" id="putterMinus" disabled>−</button>
      <div class="putter-count-wrap">
        <div class="putter-count" id="putterCount">0</div>
        <div class="putter-label">Putts</div>
      </div>
      <button class="putter-step-btn" id="putterPlus">+</button>
    </div>`;
  area.appendChild(putterGroup);

  document.getElementById('putterPlus').addEventListener('click', () => {
    setPutterCount(getPutterCount() + 1);
    updatePutterUI(true); saveState(); render();
  });
  document.getElementById('putterMinus').addEventListener('click', () => {
    const n = getPutterCount();
    if (n > 0) { setPutterCount(n - 1); updatePutterUI(true); saveState(); render(); }
  });

  // Penalty button
  const penaltyGroup = document.createElement('div');
  penaltyGroup.className = 'group';
  penaltyGroup.innerHTML = `<div class="group-title">Penalty</div>`;
  const penaltyBtn = document.createElement('button');
  penaltyBtn.className = 'cbt';
  penaltyBtn.style.cssText = 'background: rgba(176,48,32,0.12); border-color: rgba(176,48,32,0.35); color: #e07060;';
  penaltyBtn.textContent = '⚠ Penalty';
  penaltyBtn.addEventListener('click', () => {
    round[hole - 1].push('Penalty');
    penaltyBtn.classList.remove('flash');
    void penaltyBtn.offsetWidth;
    penaltyBtn.classList.add('flash');
    saveState();
    render();
  });
  penaltyGroup.appendChild(penaltyBtn);
  area.appendChild(penaltyGroup);
}
  
// ── PUTTER HELPERS ──
function getPutterCount() {
  return round[hole-1].filter(c => c === 'Putter').length;
}
function setPutterCount(n) {
  const nonPutts = round[hole-1].filter(c => c !== 'Putter');
  round[hole-1] = [...nonPutts, ...Array(n).fill('Putter')];
}
function updatePutterUI(animate) {
  const countEl = document.getElementById('putterCount');
  const minusBtn = document.getElementById('putterMinus');
  if (!countEl) return;
  const n = getPutterCount();
  countEl.textContent = n;
  if (animate) {
    countEl.classList.remove('bump');
    void countEl.offsetWidth;
    countEl.classList.add('bump');
  }
  if (minusBtn) minusBtn.disabled = n === 0;
}

// ── RENDER ──
function render() {
  document.getElementById('hNum').textContent = hole;

  document.querySelectorAll('.chip').forEach(c => {
    const h = +c.dataset.h;
    c.className = 'chip';
    if (round[h-1].length) c.classList.add('logged');
    if (h === hole)        c.classList.add('active');
  });
  document.querySelector('.chip.active')
    ?.scrollIntoView({block:'nearest', inline:'center', behavior:'smooth'});

  updatePutterUI(false);

  // Par + stroke allowance label for current hole
  const parEl = document.getElementById('holePar');
  if (parEl) {
    const cd = getCourseData();
    if (cd && hole <= cd.holes.length) {
      const ph = calcPlayingHCP(cd, HOLES);
      const s  = strokesOnHole(hole - 1, ph, cd);
      parEl.textContent = 'Par ' + cd.holes[hole-1].par + (s > 0 ? ' +' + s : '');
    } else {
      parEl.textContent = '';
    }
  }

  // Lock settings gear once round is started
  document.getElementById('settingsBtn').classList.toggle('locked', roundStarted());

  const shots = round[hole - 1];
  const countEl = document.getElementById('shotCount');
  if (countEl) countEl.textContent = shots.length > 0 ? shots.length : '';
  const row = document.getElementById('shotsRow');
  if (!shots.length) {
    row.innerHTML = `<span class="no-shots">Tap a club to start hole ${hole}</span>`;
  } else {
    row.innerHTML = shots.map((c, i) =>
      `<span class="shot-pill${c === 'Penalty' ? ' penalty' : ''}">
        <span class="pill-num">#${i+1}</span>${c}
        <button class="pill-x" data-i="${i}">✕</button>
      </span>`
    ).join('');
    row.querySelectorAll('.pill-x').forEach(b =>
      b.addEventListener('click', () => {
        round[hole-1].splice(+b.dataset.i, 1);
        saveState();
        render();
      })
    );
  }
}

// ── NAV ──
document.getElementById('prev').addEventListener('click', () => { if (hole > 1)    { hole--; saveState(); render(); }});
document.getElementById('next').addEventListener('click', () => { if (hole < HOLES) { hole++; saveState(); render(); }});

// ── UNDO ──
document.getElementById('undoBtn').addEventListener('click', () => {
  if (round[hole-1].length) { round[hole-1].pop(); saveState(); render(); }
});

// ── OVERLAY HELPERS (direct style — avoids Safari classList/flex bugs) ──
function showOverlay(id) {
  var el = document.getElementById(id);
  el.style.display = 'flex';
  el.style.flexDirection = 'column';
}
function hideOverlay(id) {
  document.getElementById(id).style.display = 'none';
}

// ── SUMMARY ──
document.getElementById('sumBtn').addEventListener('click', () => {
  const cd = getCourseData();
  const ph = cd ? calcPlayingHCP(cd, HOLES) : 0;

  const body = document.getElementById('ovBody');
  let totalSF = 0; let sfHoles = 0;
  body.innerHTML = round.map((shots, i) => {
    const pills = shots.length
      ? shots.map((c,j) => `<span class="sum-pill">#${j+1} ${c}</span>`).join('')
      : '<span class="sum-none">No shots</span>';

    let sfCol = '';
    if (cd && i < cd.holes.length) {
      const pts = stablefordPoints(i, shots.length, ph, cd);
      if (pts !== null) { totalSF += pts; sfHoles++; }
      const parLabel = 'Par ' + cd.holes[i].par;
      sfCol = `<div class="sum-sf">
        <div class="sum-sf-pts">${pts !== null ? pts : '—'}</div>
        <div class="sum-sf-lbl">${parLabel}</div>
      </div>`;
    }

    return `<div class="sum-row">
      <div class="sum-left">
        <div class="sum-hnum">${i+1}</div>
        <div class="sum-shots-count">${shots.length ? shots.length + 'sh' : ''}</div>
      </div>
      <div class="sum-pills">${pills}</div>
      ${sfCol}
    </div>`;
  }).join('');

  const total = round.reduce((a, s) => a + s.length, 0);
  const holesPlayed = round.filter(s => s.length > 0).length;

  const freq = {};
  round.forEach(shots => shots.forEach(c => {
    if (c !== 'Putter') freq[c] = (freq[c]||0)+1;
  }));
  const sorted = Object.entries(freq).sort((a,b) => b[1]-a[1]);
  let topLabel = '—';
  if (sorted.length) {
    const topCount = sorted[0][1];
    const tied = sorted.filter(function(e){ return e[1] === topCount; }).map(function(e){ return e[0]; });
    topLabel = tied.length <= 3 ? tied.join(' / ') : '—';
  }

  const statsBoxes = cd
    ? `<div class="stat-box"><div class="stat-val">${total}</div><div class="stat-lbl">Gross Shots</div></div>
       <div class="stat-box"><div class="stat-val">${sfHoles > 0 ? totalSF : '—'}</div><div class="stat-lbl">Stableford</div></div>
       <div class="stat-box"><div class="stat-val">${holesPlayed}</div><div class="stat-lbl">Holes Logged</div></div>
       <div class="stat-box"><div class="stat-val" style="font-size:${topLabel.includes('/')?'18px':'28px'}">${topLabel}</div><div class="stat-lbl">Most Used</div></div>`
    : `<div class="stat-box"><div class="stat-val">${total}</div><div class="stat-lbl">Gross Shots</div></div>
       <div class="stat-box"><div class="stat-val">${hcp > 0 ? total - Math.round(hcp * HOLES / 18) : '—'}</div><div class="stat-lbl">Net Score</div></div>
       <div class="stat-box"><div class="stat-val">${holesPlayed}</div><div class="stat-lbl">Holes Logged</div></div>
       <div class="stat-box"><div class="stat-val" style="font-size:${topLabel.includes('/')?'18px':'28px'}">${topLabel}</div><div class="stat-lbl">Most Used</div></div>`;

  document.getElementById('ovStats').innerHTML = statsBoxes;

  var titleEl = document.querySelector('#summaryOverlay .ov-title');
  if (titleEl) titleEl.textContent = selectedCourse || 'Round Summary';
  showOverlay('summaryOverlay');
});
document.getElementById('sumClose').addEventListener('click', function() {
  hideOverlay('summaryOverlay');
});

// ── COPY ──
document.getElementById('copyBtn').addEventListener('click', () => {
  const header = [
    selectedCourse ? `Course: ${selectedCourse}` : null,
    `Holes: ${HOLES}`,
    hcp > 0 ? `HCP: ${hcp}` : null,
  ].filter(Boolean).join(' | ');
  const rows = round.map((shots, i) =>
    `Hole ${i+1} (${shots.length} shots): ${shots.length ? shots.join(' → ') : '—'}`
  ).join('\n');
  const text = header ? `${header}\n\n${rows}` : rows;
  navigator.clipboard.writeText(text).then(() => {
    const b = document.getElementById('copyBtn');
    b.textContent = '✓ Copied to clipboard!';
    setTimeout(() => b.textContent = 'Copy to Clipboard', 2000);
  });
});

// ── NEW ROUND ──
let newRoundPending = false;
document.getElementById('newRoundBtn').addEventListener('click', () => {
  const btn = document.getElementById('newRoundBtn');
  if (!newRoundPending) {
    newRoundPending = true;
    btn.textContent = 'Tap again to confirm';
    btn.style.borderColor = 'rgba(176,48,32,0.7)';
    setTimeout(() => {
      if (newRoundPending) {
        newRoundPending = false;
        btn.textContent = 'New Round';
        btn.style.borderColor = '';
      }
    }, 3000);
    return;
  }
  newRoundPending = false;
  btn.textContent = 'New Round';
  btn.style.borderColor = '';
  hideOverlay('summaryOverlay');
  openLobby();
});

// ── LOBBY ──
function holeOptionsFor(course) {
  // 5-hole option only available at St Genis
  return course === 'Golfclub St Genis' ? [5, 9, 18] : [9, 18];
}

function buildHoleOpts(course) {
  const holesOpts = document.getElementById('holesOpts');
  const options = holeOptionsFor(course);
  // If current selectedHoles isn't valid for this course, reset it
  if (!options.includes(selectedHoles)) selectedHoles = 0;
  holesOpts.innerHTML = '';
  options.forEach(n => {
    const btn = document.createElement('button');
    btn.className = 'lobby-opt' + (selectedHoles === n ? ' sel' : '');
    btn.textContent = n + ' holes';
    btn.addEventListener('click', () => {
      selectedHoles = n;
      holesOpts.querySelectorAll('.lobby-opt').forEach(b => b.classList.remove('sel'));
      btn.classList.add('sel');
      updateLobbyStartBtn();
    });
    holesOpts.appendChild(btn);
  });
}

function openLobby() {
  // Rebuild course buttons
  const courseOpts = document.getElementById('courseOpts');
  courseOpts.innerHTML = '';
  PRESET_COURSES.forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'lobby-opt' + (selectedCourse === name ? ' sel' : '');
    btn.textContent = name;
    btn.addEventListener('click', () => {
      selectedCourse = name;
      courseOpts.querySelectorAll('.lobby-opt').forEach(b => b.classList.remove('sel'));
      btn.classList.add('sel');
      const customInput = document.getElementById('customCourse');
      if (name === 'Others') {
        customInput.style.display = 'block';
        customInput.focus();
        selectedCourse = customInput.value.trim() || 'Others';
      } else {
        customInput.style.display = 'none';
      }
      buildHoleOpts(selectedCourse);
      updateLobbyStartBtn();
    });
    courseOpts.appendChild(btn);
  });

  const customInput = document.getElementById('customCourse');
  if (selectedCourse === 'Others' || !PRESET_COURSES.slice(0,-1).includes(selectedCourse)) {
    const othersBtn = [...courseOpts.querySelectorAll('.lobby-opt')].find(b => b.textContent === 'Others');
    if (othersBtn) othersBtn.classList.add('sel');
    customInput.style.display = 'block';
    customInput.value = PRESET_COURSES.includes(selectedCourse) ? '' : selectedCourse;
  } else {
    customInput.style.display = 'none';
    customInput.value = '';
  }
  customInput.addEventListener('input', () => {
    selectedCourse = customInput.value.trim() || 'Others';
    buildHoleOpts(selectedCourse);
    updateLobbyStartBtn();
  });

  // Hole buttons — built based on current course
  buildHoleOpts(selectedCourse);

  // HCP input
  const hcpInput = document.getElementById('hcpInput');
  hcpInput.value = hcp;
  hcpInput.oninput = () => {
    const v = parseInt(hcpInput.value, 10);
    hcp = isNaN(v) ? 33 : Math.min(54, Math.max(0, v));
  };

  updateLobbyStartBtn();
  showOverlay('lobbyOverlay');
}

function updateLobbyStartBtn() {
  const ready = selectedCourse.length > 0 && selectedHoles > 0;
  const btn = document.getElementById('lobbyStartBtn');
  btn.disabled = !ready;
  btn.textContent = ready
    ? `Tee off → ${selectedHoles} holes at ${selectedCourse}`
    : 'Select a course & holes to start →';
}

document.getElementById('lobbyStartBtn').addEventListener('click', () => {
  if (!selectedCourse || !selectedHoles) return;
  const hcpInput = document.getElementById('hcpInput');
  const v = parseInt(hcpInput.value, 10);
  hcp = isNaN(v) ? 33 : Math.min(54, Math.max(0, v));
  HOLES = selectedHoles;
  round = Array.from({length: HOLES}, () => []);
  hole  = 1;
  hideOverlay('lobbyOverlay');
  document.getElementById('settingsBtn').classList.remove('locked');
  saveState();
  buildStrip();
  buildClubButtons();
  render();
});

// ── SETTINGS ──
function buildSettingsUI() {
  const scroll = document.getElementById('settingsScroll');
  scroll.innerHTML = '';

  Object.entries(ALL_CLUBS).forEach(([groupName, clubs]) => {
    const group = document.createElement('div');
    group.className = 'settings-group';

    const title = document.createElement('div');
    title.className = 'settings-group-title';
    title.textContent = groupName;
    group.appendChild(title);

    const grid = document.createElement('div');
    grid.className = 'settings-club-grid';

    clubs.forEach(name => {
      const btn = document.createElement('button');
      btn.className = 'toggle-btn' + (activeBag.includes(name) ? ' on' : '');
      btn.textContent = name;
      btn.addEventListener('click', () => {
        if (activeBag.includes(name)) {
          activeBag = activeBag.filter(c => c !== name);
          btn.classList.remove('on');
        } else {
          activeBag.push(name);
          btn.classList.add('on');
        }
      });
      grid.appendChild(btn);
    });

    group.appendChild(grid);
    scroll.appendChild(group);
  });

  // Putter note
  const note = document.createElement('div');
  note.className = 'settings-putter-note';
  note.innerHTML = `<span>⛳</span> Putter is always included`;
  scroll.appendChild(note);
}

function closeSettings() {
  hideOverlay('settingsOverlay');
  saveState();
  buildClubButtons();
  render();
}

document.getElementById('settingsBtn').addEventListener('click', () => {
  if (roundStarted()) return;
  buildSettingsUI();
  showOverlay('settingsOverlay');
});
document.getElementById('settingsClose').addEventListener('click', closeSettings);
document.getElementById('startRoundBtn').addEventListener('click', closeSettings);

// ── INIT ──
if (roundStarted()) {
  // Resume saved round directly
  buildStrip();
  buildClubButtons();
  render();
} else {
  // No active round — show lobby
  buildStrip();
  buildClubButtons();
  render();
  openLobby();
}
</script>
</body>
</html>
